<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tejamanikanta Gudla | Welcome</title>
  <meta name="description"
    content="Welcome to the portfolio of Tejamanikanta Gudla — Data Scientist & ML Engineer" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #050816;
      --bg-secondary: #0d1130;
      --grad-main: linear-gradient(135deg, #a855f7 0%, #6366f1 40%, #22d3ee 100%);
      --grad-alt: linear-gradient(135deg, #f472b6 0%, #a855f7 50%, #6366f1 100%);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #a855f7;
      --accent2: #22d3ee;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
    }

    ::selection {
      background: rgba(168, 85, 247, 0.4);
      color: #fff;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(#a855f7, #22d3ee);
      border-radius: 3px;
    }

    /* Background gradient blobs */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(168, 85, 247, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(34, 211, 238, 0.14) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 60% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .welcome-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Animated particles background */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(168, 85, 247, 0.6);
      border-radius: 50%;
      animation: float 20s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px) translateX(0px);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-100vh) translateX(100px);
        opacity: 0;
      }
    }

    .welcome-content {
      text-align: center;
      max-width: 900px;
      animation: fadeInUp 1s ease 0.3s both;
    }

    .welcome-header {
      margin-bottom: 2rem;
    }

    .welcome-tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.25);
      padding: 0.4rem 1rem;
      border-radius: 100px;
      margin-bottom: 2rem;
      animation: slideDown 0.8s ease 0.2s both;
    }

    .welcome-name {
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: var(--grad-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      animation: slideDown 1s ease 0.3s both;
    }

    .welcome-subtitle {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: var(--text-secondary);
      margin-bottom: 3rem;
      font-weight: 500;
      animation: slideDown 1s ease 0.4s both;
    }

    .welcome-description {
      font-size: 1.05rem;
      color: var(--text-secondary);
      margin-bottom: 3rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.8;
      animation: slideDown 1s ease 0.5s both;
    }

    .welcome-buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: slideDown 1s ease 0.6s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 2.5rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.01em;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
      z-index: 0;
    }

    .btn:hover::before {
      transform: translateX(100%);
    }

    .btn-primary {
      background: var(--grad-main);
      color: #fff;
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.4);
      z-index: 1;
    }

    .btn-primary:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(168, 85, 247, 0.6), 0 0 20px rgba(168, 85, 247, 0.3);
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      border: 1.5px solid rgba(168, 85, 247, 0.3);
      backdrop-filter: blur(10px);
      z-index: 1;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(168, 85, 247, 0.5);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(168, 85, 247, 0.3);
    }

    /* Social links */
    .welcome-social {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 3rem;
      animation: slideDown 1s ease 0.7s both;
    }

    .social-link {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.2);
      color: var(--text-secondary);
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .social-link:hover {
      color: var(--accent);
      background: rgba(168, 85, 247, 0.2);
      transform: translateY(-3px);
      box-shadow: 0 8px 16px rgba(168, 85, 247, 0.2);
    }

    .social-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.6);
      animation: slideDown 1s ease 1s both;
    }

    .scroll-dot {
      width: 4px;
      height: 8px;
      background: var(--accent);
      border-radius: 2px;
      animation: scrollAnim 2s infinite;
    }

    @keyframes scrollAnim {

      0%,
      100% {
        transform: translateY(0);
        opacity: 1
      }

      70% {
        transform: translateY(10px);
        opacity: 0
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .welcome-container {
        padding: 1.5rem;
      }

      .welcome-name {
        margin-bottom: 1rem;
      }

      .welcome-subtitle {
        margin-bottom: 2rem;
      }

      .welcome-buttons {
        gap: 1rem;
      }

      .btn {
        padding: 0.85rem 2rem;
        font-size: 0.95rem;
      }
    }

    @media (max-width: 480px) {
      .welcome-container {
        padding: 1rem;
      }

      .welcome-name {
        font-size: 2rem;
      }

      .welcome-subtitle {
        font-size: 1rem;
      }

      .welcome-buttons {
        flex-direction: column;
        width: 100%;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="particles" id="particles"></div>

    </div>

    <div class="scroll-indicator">
      <div class="scroll-dot"></div>
      <span>Scroll to explore</span>

  </div>

  <script>
    // Generate floating particles
    function generateParticles() {
      const container = document.getElementById('particles');
      const particleCount = 30;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = (Math.random() * 15 + 20) + 's';
        particle.style.width = (Math.random() * 3 + 2) + 'px';
        particle.style.height = particle.style.width;
        container.appendChild(particle);
      }
    }

    generateParticles();

    // Smooth scroll to portfolio
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const href = a.getAttribute('href');
        if (href === '#contact') {
          window.location.href = 'index.html#contact';
        }
      });
    });
  </script>

</html>
